name: Scheduled Release

# Automated release pipeline for gptme.
# - Runs twice weekly (Mon + Thu at noon UTC) to create dev pre-releases
# - Can be manually triggered for dev, patch, or minor releases
# - Dev releases use `.devYYYYMMDD` suffix and are marked as pre-releases
# - All releases get structured changelogs via build_changelog.py
#   (dev: since last tag, stable: since last stable release)
#
# Scripts shared with `make release` / `make release-dev`:
#   - scripts/bump_version.sh    — version bump, commit, tag
#   - scripts/publish_release.sh — push, GH release
#
# After creating the release, this triggers release.yml which handles
# PyPI publishing, package uploads, and artifact builds.

on:
  schedule:
    # Twice weekly: Monday and Thursday at 12:00 UTC
    - cron: '0 12 * * 1,4'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev      # Development pre-release (.devYYYYMMDD)
          - patch    # Stable patch release (x.y.Z+1)
          - minor    # Stable minor release (x.Y+1.0)

permissions:
  contents: write
  actions: write

concurrency:
  group: scheduled-release
  cancel-in-progress: false

jobs:
  check:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for changes and CI status
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find last stable release tag (no pre-release suffix)
          LAST_STABLE=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          # Find last tag of any kind (including dev tags on detached commits).
          # NOTE: `git describe --tags` only finds tags reachable from HEAD, but dev
          # release tags live on version-bump commits that aren't pushed to master.
          LAST_TAG=$(git tag --sort=-version:refname | head -1 || echo "")

          COMMITS_SINCE_TAG=0
          if [ -n "$LAST_TAG" ]; then
            # Use merge-base to handle dev tags on detached commits correctly.
            # For dev tags (one commit off master), this finds the master commit
            # they branched from. For stable tags (on master), it's the tag itself.
            BASE=$(git merge-base "${LAST_TAG}" HEAD 2>/dev/null || echo "")
            if [ -n "$BASE" ]; then
              COMMITS_SINCE_TAG=$(git rev-list "${BASE}..HEAD" --count)
            else
              echo "WARNING: could not find merge-base for ${LAST_TAG} — commit count unavailable, treating as 0."
            fi
          fi

          echo "last_stable=$LAST_STABLE" >> "$GITHUB_OUTPUT"
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "commits=$COMMITS_SINCE_TAG" >> "$GITHUB_OUTPUT"
          echo "Last stable: $LAST_STABLE | Last tag: $LAST_TAG | Commits since tag: $COMMITS_SINCE_TAG"

          # Skip if no new commits
          if [ "$COMMITS_SINCE_TAG" -eq 0 ]; then
            echo "No new commits since $LAST_TAG — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Verify CI is green on HEAD
          HEAD_SHA=$(git rev-parse HEAD)
          echo "Checking CI status for $HEAD_SHA..."

          # Check individual check runs (not suites) to avoid blocking on
          # flaky/optional checks like external API tests.
          # Exclude: API tests (external, flaky), and this workflow's own runs.
          CONCLUSIONS=$(gh api "repos/${{ github.repository }}/commits/${HEAD_SHA}/check-runs" \
            --paginate \
            --jq '[.check_runs[] | select(
              .app.slug == "github-actions" and
              (.name | test("API tests|Scheduled Release") | not)
            )] | map(.conclusion) | unique | .[]' 2>/dev/null || echo "unknown")

          echo "CI conclusions (excluding API tests): $CONCLUSIONS"

          # If any required check has failed, skip
          if echo "$CONCLUSIONS" | grep -qE "failure|action_required|timed_out"; then
            echo "CI has failures on HEAD — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "$CONCLUSIONS" | grep -qE "null|pending"; then
            echo "CI is still running on HEAD — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Require explicit success — skip if unknown or empty (API failure)
          if [ -z "$CONCLUSIONS" ] || [ "$CONCLUSIONS" = "unknown" ]; then
            echo "CI status unavailable on HEAD — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! echo "$CONCLUSIONS" | grep -q "success"; then
            echo "No successful CI checks found on HEAD — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"

  release:
    name: Create release
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install poetry
        run: pipx install poetry

      - name: Bump version
        id: version
        run: |
          TYPE="${{ github.event.inputs.release_type || 'dev' }}"
          bash scripts/bump_version.sh --type "$TYPE"

      - name: Generate changelog
        run: |
          # Download the shared changelog generator (same as `make dist/CHANGELOG.md`)
          wget -q -O scripts/build_changelog.py \
            https://raw.githubusercontent.com/ActivityWatch/activitywatch/master/scripts/build_changelog.py
          chmod +x scripts/build_changelog.py
          pip install -q requests

          TAG="${{ steps.version.outputs.tag }}"
          PRERELEASE="${{ steps.version.outputs.prerelease }}"

          # Use appropriate range: dev→since last tag, stable→since last stable
          if [ "$PRERELEASE" = "true" ]; then
            SINCE="${{ steps.version.outputs.last_tag }}"
          else
            SINCE="${{ steps.version.outputs.last_stable }}"
          fi

          echo "Generating changelog: ${SINCE}...${TAG}"
          python3 scripts/build_changelog.py \
            --range "${SINCE}...${TAG}" \
            --project-title gptme \
            --org gptme \
            --repo gptme \
            --output /tmp/changelog.md \
            --add-version-header

          echo "--- Generated changelog preview ---"
          head -50 /tmp/changelog.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/publish_release.sh --notes-file /tmp/changelog.md

      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "Triggering Release workflow for ${TAG}..."
          # GITHUB_TOKEN events don't fire release:created for other workflows,
          # so we explicitly dispatch release.yml which handles PyPI, packages,
          # and artifact builds.
          gh workflow run release.yml -f tag="${TAG}"

name: Eval Quality Gate

on:
  pull_request:
    branches: [ master ]
    types: [opened, synchronize, reopened]
    paths:
      - 'gptme/tools/**'
      - 'gptme/models/**'
      - 'gptme/eval/**'
      - 'gptme/prompts/**'
      - 'gptme/message*.py'
      - 'gptme/llm/**'
      - 'gptme/chat.py'
      - 'gptme/codeblock.py'
      - 'gptme/session.py'

# Cancel stale runs for the same PR
concurrency:
  group: eval-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  eval-ci:
    name: Eval Quality Gate
    runs-on: ubuntu-latest
    # Non-blocking in Phase 1 — informational only
    continue-on-error: true
    # Skip draft PRs to save API cost
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      pull-requests: write
      contents: read

    steps:
    - name: Checkout PR branch
      uses: actions/checkout@v6

    - name: Check API key availability
      id: check_key
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        if [ -z "$ANTHROPIC_API_KEY" ]; then
          echo "available=false" >> "$GITHUB_OUTPUT"
          echo "Fork PRs do not have access to ANTHROPIC_API_KEY — skipping eval."
        else
          echo "available=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Install poetry
      if: steps.check_key.outputs.available == 'true'
      run: pipx install poetry

    - name: Set up Python
      if: steps.check_key.outputs.available == 'true'
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'poetry'
        cache-dependency-path: poetry.lock

    - name: Install gptme from PR branch
      if: steps.check_key.outputs.available == 'true'
      run: poetry install

    - name: Write gptme config
      if: steps.check_key.outputs.available == 'true'
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        mkdir -p ~/.config/gptme
        # Use python to safely write TOML, avoiding shell interpolation issues
        # with special characters (quotes, backslashes) in the key value
        python3 -c "
        import os, pathlib
        key = os.environ['ANTHROPIC_API_KEY']
        # Escape backslashes and double-quotes for TOML string literal
        key_escaped = key.replace('\\\\', '\\\\\\\\').replace('\"', '\\\\\"')
        pathlib.Path(os.path.expanduser('~/.config/gptme/config.toml')).write_text(
            f'[env]\\nANTHROPIC_API_KEY = \"{key_escaped}\"\\n'
        )
        "

    - name: Run eval quality gate (hello, prime100, fix-bug)
      id: run_evals
      if: steps.check_key.outputs.available == 'true'
      env:
        EVAL_RESULTS_DIR: ${{ github.workspace }}/eval_results
        EVAL_MODEL: anthropic/claude-haiku-4-5@tool
      run: |
        mkdir -p eval_results
        # 3 basic tests with Haiku — fast and cheap (~$0.02–0.05/run)
        poetry run python -m gptme.eval \
          hello prime100 fix-bug \
          -m "$EVAL_MODEL" \
          --timeout 60 \
          --parallel 3

    - name: Parse results and post PR comment
      if: always()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        EVAL_RESULTS_DIR: ${{ github.workspace }}/eval_results
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        KEY_AVAILABLE: ${{ steps.check_key.outputs.available }}
        EVAL_OUTCOME: ${{ steps.run_evals.outcome }}
        EVAL_MODEL: anthropic/claude-haiku-4-5@tool
      run: |
        python3 - << 'PYEOF'
        import csv
        import os
        import subprocess
        from pathlib import Path

        results_dir = Path(os.environ["EVAL_RESULTS_DIR"])
        pr_number = os.environ["PR_NUMBER"]
        repo = os.environ["REPO"]
        run_url = os.environ["RUN_URL"]
        key_available = os.environ.get("KEY_AVAILABLE", "false") == "true"
        eval_outcome = os.environ.get("EVAL_OUTCOME", "skipped")  # success|failure|cancelled|skipped
        # Derive display name from model spec (e.g. "anthropic/claude-haiku-4-5@tool" → "claude-haiku-4-5 (tool)")
        eval_model_spec = os.environ.get("EVAL_MODEL", "")
        _model_id = eval_model_spec.split("/")[-1]  # strip provider prefix
        _model_name, _backend = (_model_id.rsplit("@", 1) if "@" in _model_id else (_model_id, ""))
        eval_model_display = f"{_model_name} ({_backend})" if _backend else _model_name
        # Unique marker so we can identify and update this workflow's comment specifically
        COMMENT_MARKER = "<!-- eval-quality-gate -->"

        if not key_available:
            comment = (
                "## ℹ️ Eval Quality Gate — skipped (fork PR)\n\n"
                "Evals require `ANTHROPIC_API_KEY` which is not available for fork PRs.\n\n"
                f"*Informational only — does not block merge*\n{COMMENT_MARKER}"
            )
        else:
            # Find the most recent results CSV
            csv_files = sorted(results_dir.glob("*/eval_results.csv"), key=lambda p: p.parent.name)

            if not csv_files:
                # No CSV produced — step-level failure (bad install, auth error, etc.)
                reason = "step failed before producing results" if eval_outcome == "failure" else "step did not run"
                comment = (
                    "## ⚠️ Eval Quality Gate — could not run\n\n"
                    f"Evals did not produce results ({reason}).\n\n"
                    f"[View run]({run_url})\n\n"
                    f"*Informational only — does not block merge*\n{COMMENT_MARKER}"
                )
            else:
                csv_file = csv_files[-1]
                rows = []
                with open(csv_file) as f:
                    for row in csv.DictReader(f):
                        rows.append(row)

                passed_count = sum(1 for r in rows if r["Passed"] == "true")
                total_count = len(rows)
                total_duration = round(sum(float(r["Total Duration"]) for r in rows), 1)

                # Warn if the eval step itself failed (partial results)
                step_warning = ""
                if eval_outcome == "failure" and passed_count < total_count:
                    step_warning = "\n\n> ⚠️ Eval step exited with an error — results may be incomplete."

                status_emoji = "✅" if passed_count == total_count else "⚠️"
                header = f"## {status_emoji} Eval Quality Gate — {passed_count}/{total_count} tests passed"

                table_lines = [
                    "| Test | Status | Duration |",
                    "|------|--------|----------|",
                ]
                for row in rows:
                    icon = "✅" if row["Passed"] == "true" else "❌"
                    dur = round(float(row["Total Duration"]), 1)
                    table_lines.append(f"| `{row['Test']}` | {icon} | {dur}s |")
                table = "\n".join(table_lines)

                comment = (
                    f"{header}\n\n"
                    f"{table}\n\n"
                    f"Model: `{eval_model_display}` · Total: {total_duration}s · "
                    f"[Full run]({run_url})"
                    f"{step_warning}\n\n"
                    f"*Informational only — does not block merge*\n{COMMENT_MARKER}"
                )

        # Post comment: find our prior comment by unique marker, then update or create
        import json
        list_result = subprocess.run(
            ["gh", "api", f"repos/{repo}/issues/{pr_number}/comments",
             "--jq", f'[.[] | select(.body | contains("{COMMENT_MARKER}"))] | last | .id'],
            capture_output=True, text=True, check=False,
        )
        prior_id = list_result.stdout.strip()
        if prior_id and prior_id != "null":
            # Update the existing comment in-place
            update_result = subprocess.run(
                ["gh", "api", f"repos/{repo}/issues/comments/{prior_id}",
                 "-X", "PATCH", "-f", f"body={comment}"],
                capture_output=True, text=True, check=False,
            )
            if update_result.returncode != 0:
                print(f"WARNING: failed to update existing comment: {update_result.stderr}")
            else:
                print(f"Updated existing PR comment (id={prior_id}).")
        else:
            # No prior comment from this workflow — create a new one
            new_result = subprocess.run(
                ["gh", "pr", "comment", pr_number, "--repo", repo, "--body", comment],
                capture_output=True, text=True, check=False,
            )
            if new_result.returncode != 0:
                print(f"WARNING: failed to post PR comment: {new_result.stderr}")
            else:
                print("Posted new PR comment.")
        PYEOF

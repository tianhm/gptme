name: WebUI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master, 'dev/*' ]
    paths:
      - 'webui/**'
      - '.github/workflows/webui.yml'

defaults:
  run:
    working-directory: webui

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: webui/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npm run typecheck

    - name: Lint
      run: npm run lint

    - name: Test
      run: npm test

    - name: Build
      run: npm run build

    - name: Upload dist artifact
      if: github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v7
      with:
        name: webui-dist
        path: webui/dist
        retention-days: 30

  deploy:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: chat-gptme-org
      url: https://chat.gptme.org
    steps:
    - uses: actions/checkout@v6

    - name: Download dist artifact
      uses: actions/download-artifact@v6
      with:
        name: webui-dist
        path: dist

    - name: Deploy to Cloudflare Pages
      uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0  # v4.0.0
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy dist --project-name=gptme-webui

    - name: Smoke test deployed deep links
      working-directory: .
      run: |
        python3 scripts/verify_cloudflare_pages_deep_links.py \
          --redirects-path dist/_redirects \
          --base-url https://chat.gptme.org

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js 20
      uses: actions/setup-node@v6
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: webui/package-lock.json

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install frontend dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    # ── stable pass (latest PyPI release) ────────────────────────────────────
    - name: Install stable gptme (PyPI)
      working-directory: .
      run: pip install 'gptme[server]'

    - name: Start server (stable)
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'dummy-ci-key' }}
        MODEL: anthropic/claude-3-5-haiku-latest
      run: |
        gptme-server --cors-origin="http://localhost:5701" &
        echo $! > /tmp/gptme-server.pid
        sleep 3

    - name: Health-check server (stable)
      run: curl --retry 2 --retry-delay 5 --retry-connrefused -sSfL http://localhost:5700/api/v2

    - name: Run e2e tests (stable)
      id: e2e-stable
      continue-on-error: true
      run: npm run test:e2e

    - name: Upload stable test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report-stable
        path: webui/playwright-report/
        retention-days: 30

    - name: Stop server (stable)
      if: always()
      working-directory: .
      run: |
        kill "$(cat /tmp/gptme-server.pid)" 2>/dev/null || true
        sleep 2

    # ── dev pass (git master) ─────────────────────────────────────────────────
    - name: Install dev gptme (git master)
      working-directory: .
      run: pip install --force-reinstall 'gptme[server] @ git+https://github.com/gptme/gptme.git'

    - name: Start server (dev)
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'dummy-ci-key' }}
        MODEL: anthropic/claude-3-5-haiku-latest
      run: |
        gptme-server --cors-origin="http://localhost:5701" &
        echo $! > /tmp/gptme-server.pid
        sleep 3

    - name: Health-check server (dev)
      run: curl --retry 2 --retry-delay 5 --retry-connrefused -sSfL http://localhost:5700/api/v2

    - name: Run e2e tests (dev)
      id: e2e-dev
      continue-on-error: true
      run: npm run test:e2e

    - name: Upload dev test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report-dev
        path: webui/playwright-report/
        retention-days: 30

    - name: Stop server (dev)
      if: always()
      working-directory: .
      run: kill "$(cat /tmp/gptme-server.pid)" 2>/dev/null || true

    - name: Require both passes to succeed
      if: always()
      working-directory: .
      run: |
        stable="${{ steps.e2e-stable.outcome }}"
        dev="${{ steps.e2e-dev.outcome }}"
        echo "stable: $stable  dev: $dev"
        [ "$stable" = "success" ] && [ "$dev" = "success" ]

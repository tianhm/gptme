name: 'gptme-bot'
description: 'A composite action for the gptme-bot workflow using the github_bot.py script'
inputs:
  openai_api_key:
    description: 'OpenAI API Key'
    required: false
  anthropic_api_key:
    description: 'Anthropic API Key'
    required: false
  model:
    description: 'Model to use'
    required: false
    default: 'anthropic/claude-sonnet-4-6'
  github_token:
    description: 'GitHub Token'
    required: true
  allowlist:
    description: 'Comma-separated list of GitHub usernames allowed to trigger the bot'
    required: true
    default: 'ErikBjare'
  mode:
    description: 'Bot mode: "comment" (default) or "resolve" (label-triggered issue resolution)'
    required: false
    default: 'comment'

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install gptme
      shell: bash
      run: |
        pip install gptme[server]

    - name: Write gptme config
      shell: bash
      run: |
        mkdir -p ~/.config/gptme
        if [ "${{ inputs.mode }}" = "resolve" ]; then
          cat > ~/.config/gptme/config.toml << EOF
        [prompt]
        about_user = "You are the gptme-bot operating in issue-resolver mode. You have been triggered by a label on a GitHub issue. Your task is to read the issue, understand what fix is needed, implement the changes, and create a draft PR."
        response_preference = "Don't explain basic concepts. Focus on making the minimal correct fix."
        EOF
        else
          cat > ~/.config/gptme/config.toml << EOF
        [prompt]
        about_user = "The user is talking to the gptme bot through GitHub comments. They have initiated conversation by pinging it with @gptme, triggering a GitHub Action in which gptme now runs."
        response_preference = "Don't explain basic concepts"
        EOF
        fi

    - name: Run GitHub Bot
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        MODEL: ${{ inputs.model }}
        ALLOWLIST: ${{ inputs.allowlist }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
      run: |
        # Prefer the local script when running inside the gptme repo itself.
        # Fall back to downloading a pinned version for use as a reusable external action.
        # Pin to specific commit for supply chain security (248aac98)
        if [ -f "scripts/github_bot.py" ]; then
          cp scripts/github_bot.py /tmp/github_bot.py
        else
          SCRIPT_URL="https://raw.githubusercontent.com/gptme/gptme/248aac98c02113009837c4b582dd72ed0604dd63/scripts/github_bot.py"
          curl -fsL "$SCRIPT_URL" > /tmp/github_bot.py
        fi
        python /tmp/github_bot.py --mode "${{ inputs.mode }}" --workspace .

    - name: Report error
      if: failure() && env.GPTME_BOT_HANDLED_FAILURE != '1'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        MESSAGE="I'm sorry, I could not fulfill your request. Please check the [log of this run]($RUN_URL) for more information."
        echo "$MESSAGE" | gh issue comment ${{ github.event.issue.number }} -R ${{ github.repository }} --body-file=-

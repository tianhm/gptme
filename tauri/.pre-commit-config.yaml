repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^tauri/src-tauri/gen/
      - id: end-of-file-fixer
        exclude: ^tauri/src-tauri/gen/
      - id: check-yaml
      - id: check-json
        exclude: ^tauri/src-tauri/gen/

  - repo: local
    hooks:
      - id: fmt
        name: cargo fmt (tauri)
        entry: cargo fmt --manifest-path tauri/src-tauri/Cargo.toml --
        language: system
        files: ^tauri/src-tauri/.*\.rs$
        pass_filenames: true

      - id: clippy
        name: cargo clippy (tauri)
        entry: cargo clippy --manifest-path tauri/src-tauri/Cargo.toml -- -D warnings
        language: system
        files: ^tauri/src-tauri/.*\.rs$
        pass_filenames: false
